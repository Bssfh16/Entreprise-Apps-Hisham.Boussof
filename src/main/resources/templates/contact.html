<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contact')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <main>
        <div class="form-card">
            <h2>Stuur ons een bericht</h2>
            
            <div th:if="${success}" style="background-color: #d1fae5; color: #065f46; padding: 15px; border-left: 4px solid #10b981; border-radius: 4px; margin-bottom: 20px; font-weight: 500;">
                Jouw bericht werd succesvol verzonden!
            </div>
            
            <form action="/contact" method="post">
                <div class="form-group">
                    <label>Jouw Naam</label>
                    <input type="text" name="naam" required placeholder="Bv. Maikel Test">
                </div>
                <div class="form-group">
                    <label>Jouw E-mail</label>
                    <input type="email" name="email" required placeholder="maikel@test.com">
                </div>
                <div class="form-group">
                    <label>Bericht</label>
                    <textarea name="bericht" rows="5" required placeholder="Omschrijving probleem..."></textarea>
                </div>
                <button type="submit" class="btn">Verstuur Bericht</button>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
