<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contact')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <main>
        <div class="form-card">
            <h2>Stuur ons een bericht</h2>
            
            <p th:if="${success}" style="color: var(--donker-groen); font-weight: bold;">Jouw bericht werd succesvol verzonden via Mailtrap!</p>
            
            <form action="/contact" method="post">
                <div class="form-group">
                    <label>Jouw Naam</label>
                    <input type="text" name="naam" required>
                </div>
                <div class="form-group">
                    <label>Jouw E-mail</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-group">
                    <label>Bericht</label>
                    <textarea name="bericht" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn">Verstuur Bericht</button>
            </form>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
