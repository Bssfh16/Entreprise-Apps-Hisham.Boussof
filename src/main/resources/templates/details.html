<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Details Event')}"></head>
<body>
    <nav th:replace="~{fragments/layout :: navbar}"></nav>
    <main>
        <div class="form-card">
            <h2 th:text="${evenement.titel}" style="color: var(--donker-oranje);">Titel</h2>
            <p><strong>Wanneer:</strong> <span th:text="${evenement.tijdstip}"></span></p>
            <p><strong>Organisatie:</strong> <span th:text="${evenement.organisatie}"></span></p>
            <p><strong>Contact:</strong> <a th:href="'mailto:' + ${evenement.mailContactpersoon}" th:text="${evenement.mailContactpersoon}"></a></p>
            
            <div style="background-color: var(--achtergrond-kleur); padding: 15px; border-radius: 8px; margin: 15px 0;">
                <h4 style="margin-top:0;">Locatie</h4>
                <p th:text="${evenement.locatie.naam}"></p>
                <p th:text="${evenement.locatie.adres}"></p>
                <p>Capaciteit: <span th:text="${evenement.locatie.capaciteit}"></span> personen</p>
            </div>

            <h4>Omschrijving</h4>
            <p th:text="${evenement.omschrijving}"></p>
            <br>
            <a href="/" class="btn">Terug naar overzicht</a>
        </div>
    </main>
    <footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
